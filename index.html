<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan de Sécurité et de Santé (PSS) interactif</title>
    <style>
        :root {
            --primary-color: #1e3a8a;
            --primary-light: #eff6ff;
            --text-main: #1f2937;
            --text-muted: #4b5563;
            --border-color: #e5e7eb;
            --bg-zebra: #f8fafc;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: var(--text-main);
            background-color: #f1f5f9;
            padding: 24px;
            line-height: 1.5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        header {
            margin-bottom: 28px;
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 16px;
        }

        h1 {
            color: var(--primary-color);
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 15px;
        }

        .controls {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            background: var(--primary-light);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #dbeafe;
        }

        .search-group {
            flex: 1;
            min-width: 280px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.15);
        }

        .stats {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: 500;
            text-align: right;
        }

        .table-container {
            overflow-x: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th {
            background-color: var(--primary-color);
            color: white;
            font-weight: 600;
            padding: 14px 16px;
            position: sticky;
            top: 0;
            white-space: nowrap;
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: top;
        }

        tr:nth-child(even) td {
            background-color: var(--bg-zebra);
        }

        tr:hover td {
            background-color: #f0fdf4 !important;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            background-color: #e2e8f0;
            color: #334155;
            white-space: nowrap;
        }

        .category-Gros { background-color: #dbeafe; color: #1e40af; }
        .category-Hauteur { background-color: #fee2e2; color: #991b1b; }
        .category-Terrassement { background-color: #fef3c7; color: #92400e; }
        .category-Chute { background-color: #ffedd5; color: #9a3412; }
        .category-Engin { background-color: #f3e8ff; color: #6b21a8; }
        .category-Techniques { background-color: #ccfbf1; color: #115e59; }
        .category-Proximité { background-color: #e0f2fe; color: #075985; }
        .category-Organisation { background-color: #f1f5f9; color: #334155; }
        .category-Conditions { background-color: #e0e7ff; color: #3730a3; }
        .category-Coactivité { background-color: #fae8ff; color: #86198f; }
        .category-Manutention { background-color: #ede9fe; color: #5b21b6; }
        .category-Impétrants { background-color: #ffe4e6; color: #9f1239; }

        @media (max-width: 768px) {
            body { padding: 12px; }
            .container { padding: 16px; }
            .controls { flex-direction: column; gap: 12px; }
            th, td { padding: 10px 12px; font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="container">

        <div class="search-group">

            <input type="text" id="searchBar" placeholder="Ex: grue, élingue, chute, coupure, EPI..." onkeyup="filterData()">

    </div>

    <div class="stats" id="rowCount">Affichage de 0 lignes</div>

    <div class="table-container">
        <table>
            <thead>

                    <th style="width: 25%">Mesure de Prévention</th>
                    <th style="width: 20%">Contrôles & Vérifications</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Rendu dynamique via JavaScript -->
            </tbody>
        </table>
    </div>
</div>

    function getBadgeClass(cat) {
        if (cat.includes("Gros Œuvre")) return "category-Gros";
        if (cat.includes("Hauteur")) return "category-Hauteur";
        if (cat.includes("Terrassement")) return "category-Terrassement";
        if (cat.includes("Chute")) return "category-Chute";
        if (cat.includes("Engin")) return "category-Engin";
        if (cat.includes("Techniques électriques") || cat.includes("HVAC")) return "category-Techniques";
        if (cat.includes("Proximité")) return "category-Proximité";
        if (cat.includes("Organisation")) return "category-Organisation";
        if (cat.includes("Conditions")) return "category-Conditions";
        if (cat.includes("Coactivité")) return "category-Coactivité";
        if (cat.includes("Manutention")) return "category-Manutention";
        if (cat.includes("Impétrants")) return "category-Impétrants";
        return "";
    }

    function renderTable(items) {
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";
        
        items.forEach(item => {
            const tr = document.createElement("tr");
            
            tr.innerHTML = `
                <td><span class="badge ${getBadgeClass(item.category)}">${item.category}</span></td>
                <td><strong>${item.source}</strong></td>
                <td class="text-danger">${item.risk}</td>
                <td>${item.prevention}</td>
                <td><em>${item.control}</em></td>
            `;
            tbody.appendChild(tr);
        });
        
        document.getElementById("rowCount").innerText = `${items.length} ligne(s) affichée(s) sur ${data.length}`;
    }

    function filterData() {
        const categoryValue = document.getElementById("categoryFilter").value.toLowerCase();
        const searchValue = document.getElementById("searchBar").value.toLowerCase();
        
        const filtered = data.filter(item => {
            const matchesCategory = !categoryValue || item.category.toLowerCase() === categoryValue;
            const matchesSearch = !searchValue || 
                item.source.toLowerCase().includes(searchValue) ||
                item.risk.toLowerCase().includes(searchValue) ||
                item.prevention.toLowerCase().includes(searchValue) ||
                item.control.toLowerCase().includes(searchValue);
                
            return matchesCategory && matchesSearch;
        });
        
        renderTable(filtered);
    }

    // Initial load
    renderTable(data);
</script>
